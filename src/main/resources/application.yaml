spring:
  application:
    name: P0_Findex_Test

  # H2 데이터베이스 설정 (로컬 개발 환경)
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:findexdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true